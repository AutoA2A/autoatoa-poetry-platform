<head><script>window.APP_DATA = [{"id":1,"title":"静夜思","author":"李白","dynasty":"唐代","content":"床前明月光，疑是地上霜。举头望明月，低头思故乡。"},{"id":2,"title":"春望","author":"杜甫","dynasty":"唐代","content":"国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。"},{"id":3,"title":"滕王阁序","author":"王勃","dynasty":"唐代","content":"落霞与孤鹜齐飞，秋水共长天一色。"},{"id":4,"title":"登高","author":"杜甫","dynasty":"唐代","content":"风急天高猿啸哀，渚清沙白鸟飞回。"},{"id":5,"title":"春晓","author":"孟浩然","dynasty":"唐代","content":"春眠不觉晓，处处闻啼鸟。"},{"id":6,"title":"望庐山瀑布","author":"李白","dynasty":"唐代","content":"日照香炉生紫烟，遥看瀑布挂前川。"},{"id":7,"title":"将进酒","author":"李白","dynasty":"唐代","content":"君不见黄河之水天上来，奔流到海不复回。"},{"id":8,"title":"相思","author":"王维","dynasty":"唐代","content":"红豆生南国，春来发几枝。"},{"id":9,"title":"春夜洛城闻笛","author":"李白","dynasty":"唐代","content":"谁家玉笛暗飞声，散入春风满洛城。"},{"id":10,"title":"秋浦歌","author":"王维","dynasty":"唐代","content":"白发三千丈，缘愁似个长。"},{"id":11,"title":"清平调·其一","author":"李白","dynasty":"唐代","content":"云想衣裳花想容，春风拂槛露华浓。"},{"id":12,"title":"登幽州台歌","author":"陈子昂","dynasty":"唐代","content":"前不见古人，后不见来者。"},{"id":13,"title":"送元二使安西","author":"李白","dynasty":"唐代","content":"渭城朝雨浥轻尘，客舍青青柳色新。"},{"id":14,"title":"行路难","author":"李白","dynasty":"唐代","content":"金樽清酒斗十千，玉盘珍羞直万钱。"},{"id":15,"title":"夜泊牛渚怀古","author":"杜甫","dynasty":"唐","content":"牛渚西江夜，青帆已过吴。星河欲转千帆舞，江枫渔火对愁眠。","notes":"牛渚在今安徽省，古为楚汉交战之地。","analysis":"全诗以夜泊为背景，抒发对古战场的沉思与时光流逝的感慨。","background":"杜甫晚年流寓江陵，途经牛渚，感怀古战场。","image":"https://example.com/images/yebo_niuzhu.jpg"},{"id":16,"title":"赤壁怀古","author":"苏轼","dynasty":"宋","content":"大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。","notes":"赤壁指三国时期的赤壁之战遗址。","analysis":"借古讽今，抒发对历史兴衰的哲理感悟。","background":"苏轼被贬黄州时写下此词，表达对时局的失望。","image":"https://example.com/images/chibi_huaigu.jpg"},{"id":17,"title":"枫桥夜泊","author":"张继","dynasty":"唐","content":"月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。","notes":"寒山寺位于苏州，钟声闻名。","analysis":"以凄清的夜景写旅人孤寂之情。","background":"张继在江南旅居时所作。","image":"https://example.com/images/fengqiao_yebo.jpg"},{"id":18,"title":"江雪","author":"柳宗元","dynasty":"唐","content":"千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。","notes":"写渔翁的孤高与清冷的自然景象。","analysis":"以极简的笔触营造出寂寥的意境，表现隐逸情怀。","background":"柳宗元被贬永州时的所见。","image":"https://example.com/images/jiangxue.jpg"},{"id":19,"title":"黄鹤楼送孟浩然之广陵","author":"李白","dynasty":"唐","content":"故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，惟见长江天际流。","notes":"黄鹤楼位于武汉，古代名胜。","analysis":"送别情深，借江景抒发对友人前程的祝愿。","background":"李白与孟浩然在黄鹤楼相送。","image":"https://example.com/images/huanghe_lou.jpg"},{"id":20,"title":"秋夜将晓出篱门迎凉有感二首·其一","author":"陆游","dynasty":"宋","content":"三万里河东入海，五千仞岳上摩天。欲把西湖比西子，淡妆浓抹总相宜。","notes":"此句常被误写，实际为《秋夜将晓出篱门迎凉有感二首·其二》。","analysis":"通过宏大的自然景观映衬个人情怀。","background":"陆游晚年居住绍兴，感秋思。","image":"https://example.com/images/qiuyue_luyu.jpg"},{"id":21,"title":"鹊桥仙·纤云弄巧","author":"秦观","dynasty":"宋","content":"纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。","notes":"七夕佳节的爱情词。","analysis":"以浪漫的星河意象描绘牛郎织女的相会。","background":"秦观擅长写爱情词，此作传颂千古。","image":"https://example.com/images/queqiao_xian.jpg"},{"id":22,"title":"早发白帝彩云间","author":"李白","dynasty":"唐","content":"朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。","notes":"白帝指今重庆奉节白帝城。","analysis":"描写江上行舟的快意与山水的壮阔。","background":"李白在游历巴蜀时所作。","image":"https://example.com/images/baidi_chayun.jpg"},{"id":23,"title":"山居秋暝","author":"王维","dynasty":"唐","content":"空山新雨后，天气晚来秋。明月松间照，清泉石上流。","notes":"王维山水诗的典型。","analysis":"以寂静的山林景象表现禅意与宁静。","background":"王维隐居山林期间的写照。","image":"https://example.com/images/shanju_qiuming.jpg"},{"id":24,"title":"长恨歌","author":"白居易","dynasty":"唐","content":"汉皇重色思倾国，御宇多年求不得。杨家有女初长成，养在深闺人未识。","notes":"长篇叙事诗，描写唐玄宗与杨贵妃的爱情悲剧。","analysis":"通过细腻的情感描写与历史背景，展示盛唐的繁华与凄凉。","background":"白居易在长安任职时创作。","image":"https://example.com/images/changhen_ge.jpg"},{"id":25,"title":"泊秦淮","author":"杜牧","dynasty":"唐","content":"烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱《后庭花》。","notes":"秦淮河是南京的母亲河。","analysis":"借夜泊景象讽刺当时的奢靡与国势衰微。","background":"杜牧被贬后在南京写下此诗。","image":"https://example.com/images/bo_qinhuai.jpg"},{"id":26,"title":"渔家傲·秋思","author":"范仲淹","dynasty":"宋","content":"塞下秋来风景异，塞外春回草木深。何处春风不相送，满眼青山入眼青。","notes":"此词表现边塞秋思。","analysis":"以对比手法凸显离愁。","background":"范仲淹任职边塞期间所作。","image":"https://example.com/images/yuji_aoxiu.jpg"},{"id":27,"title":"题西林壁","author":"苏轼","dynasty":"宋","content":"横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。","notes":"写庐山的云雾景象。","analysis":"以哲理的视角探讨认识的局限。","background":"苏轼被贬黄州时游历庐山。","image":"https://example.com/images/xi_lin_bi.jpg"},{"id":28,"title":"春夜喜雨","author":"杜甫","dynasty":"唐","content":"好雨知时节，当春乃发生。随风潜入夜，润物细无声。","notes":"赞美春雨的恩泽。","analysis":"通过细腻描写表现自然与人的和谐。","background":"杜甫在成都写下此诗，感恩天时。","image":"https://example.com/images/chunye_xiyu.jpg"},{"id":29,"title":"送别","author":"王之涣","dynasty":"唐","content":"山中相送罢，日暮掩柴扉。春风不解意，吹落古道枝。","notes":"送别情景的短篇。","analysis":"以春风暗喻离别的无奈。","background":"王之涣在山中送别友人。","image":"https://example.com/images/songbie_wangzhihuan.jpg"},{"id":30,"title":"菩萨蛮·书江西造口壁","author":"辛弃疾","dynasty":"宋","content":"郁孤台下清江水，东流至此已千里。浪花淘尽英雄泪，谁与我共饮金杯。","notes":"辛弃疾的豪放词。","analysis":"以江水奔流比喻历史沧桑，抒发壮志未酬。","background":"辛弃疾在江西造口作此词。","image":"https://example.com/images/bosaman_xinqi.jpg"},{"id":31,"title":"梅花","author":"王安石","dynasty":"宋","content":"墙角数枝梅，凌寒独自开。遥知不是雪，为有暗香来。","notes":"描写梅花的坚韧与清香。","analysis":"以梅喻人，表达高洁的品格。","background":"王安石在北宋任职期间所作。","image":"https://example.com/images/meihua_wanganshi.jpg"},{"id":32,"title":"咏鹅","author":"骆宾王","dynasty":"唐","content":"鹅，鹅，鹅，曲项向天歌。白毛浮绿水，红掌拨清波。","notes":"儿童诗，语言生动。","analysis":"通过形象描写培养儿童的观察力。","background":"骆宾王少年时写作。","image":"https://example.com/images/yong_e.jpg"},{"id":33,"title":"题都城南庄","author":"崔护","dynasty":"唐","content":"去年今日此门中，人在楼上，花开如海。今朝不见旧时人，独倚阑干泪满衣。","notes":"抒写时光流逝的感伤。","analysis":"以花喻人，表达离别之情。","background":"崔护在都城南庄写下此诗。","image":"https://example.com/images/ducheng_nanzhuang.jpg"},{"id":34,"title":"夜雨寄北","author":"李商隐","dynasty":"唐","content":"君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山旧时月。","notes":"写离别相思的情绪。","analysis":"以雨夜与月光对比，表现思念之深。","background":"李商隐在仕途不顺时写给远方友人。","image":"https://example.com/images/yeyu_jibei.jpg"},{"id":35,"title":"长相思·其一","author":"王勃","dynasty":"唐代","content":"红豆生南国，春来发几枝。愿君多采撷，此物最相思。"},{"id":36,"title":"登鹳雀楼","author":"王之涣","dynasty":"唐代","content":"白日依山尽，黄河入海流。欲穷千里目，更上一层楼。"},{"id":37,"title":"早春呈水部张十八员外","author":"韩翃","dynasty":"唐代","content":"天街小雨润如酥，草色遥看近却无。最是一年春好处，绝胜烟柳满皇都。"},{"id":38,"title":"春宵","author":"杜牧","dynasty":"唐代","content":"寒雨连江夜入吴，平明送客楚山孤。洛阳亲友如相问，一片冰心在玉壶。"},{"id":39,"title":"黄鹤楼","author":"崔颢","dynasty":"唐代","content":"昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。"},{"id":40,"title":"春怨","author":"王维","dynasty":"唐代","content":"春怨春愁杀人酒，春愁酒里春愁透。酒中春愁愁春酒，愁酒春酒酒愁春。"}];(function(d){try{if(Array.isArray(d)){["items","list","data","records","rows","all","results","content"].forEach(function(k){try{if(d[k]===undefined)d[k]=d;}catch(e){}});}window.APP_LIST=Array.isArray(d)?d:[];window.getById=function(id){return window.APP_LIST.find(function(x){return x&&String(x.id)===String(id);})||null;};}catch(e){}})(window.APP_DATA);</script>

<style>

<script>
// Ensure APP_DATA exists
if (!Array.isArray(window.APP_DATA)) {
    console.error('APP_DATA is not defined or not an array');
} else {
    const data = window.APP_DATA;
    // Get unique dynasties preserving order of first appearance
    const dynasties = [...new Set(data.map(item => item.dynasty))];
    const container = document.getElementById('content');

    dynasties.forEach(dyn => {
        const section = document.createElement('section');
        section.className = 'dynasty-section';
        const title = document.createElement('h2');
        title.className = 'dynasty-title';
        title.textContent = dyn;
        section.appendChild(title);

        const list = document.createElement('div');
        list.className = 'poem-list';

        data.filter(p => p.dynasty === dyn).forEach(p => {
            const card = document.createElement('a');
            card.className = 'poem-card';
            card.href = `detail.html?id=${p.id}`;
            const poemTitle = document.createElement('div');
            poemTitle.className = 'poem-title';
            poemTitle.textContent = p.title;
            const meta = document.createElement('div');
            meta.className = 'poem-meta';
            meta.textContent = `${p.author} · ${p.dynasty}`;
            card.appendChild(poemTitle);
            card.appendChild(meta);
            list.appendChild(card);
        });

        section.appendChild(list);
        container.appendChild(section);
    });
}
</script>
